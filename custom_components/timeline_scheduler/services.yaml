upsert_schedule:
  name: Create or update schedule
  description: Create or replace a timeline schedule by id.
  fields:
    id:
      required: true
      example: bed
      selector:
        text:
    name:
      example: Bed
      selector:
        text:
    target:
      required: true
      example: '{"entity_id": "climate.bed"}'
      selector:
        object:
    apply:
      required: true
      example: climate_temperature
      selector:
        select:
          options: [switch_onoff, climate_temperature, number_set]
    transitions:
      required: true
      selector:
        object:
    enabled:
      selector:
        boolean:
    default:
      selector:
        object:
remove_schedule:
  name: Remove schedule
  fields:
    id:
      required: true
      selector:
        text:
apply_now:
  name: Apply schedule now
  fields:
    id:
      required: true
      selector:
        text:
override:
  name: Override current value
  description: Hold a value now until the schedule's next transition.
  fields:
    id:
      required: true
      selector:
        text:
    value:
      required: true
      example: "72"
      selector:
        text:
clear_override:
  name: Clear override
  fields:
    id:
      required: true
      selector:
        text:
reload:
  name: Reload schedules from storage
